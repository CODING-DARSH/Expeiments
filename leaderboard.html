<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🏆 Hack & Crack Leaderboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #080810; --surface: #0f0f1a; --surface2: #16162a;
      --border: #252538; --border2: #32324a;
      --accent: #ff6b35; --accent2: #7c3aed; --accent3: #06b6d4;
      --green: #22c55e; --green-dim: rgba(34,197,94,0.12);
      --red: #ef4444; --yellow: #eab308;
      --text: #e2e8f0; --text2: #94a3b8; --muted: #475569;
      --font-mono: 'Space Mono', monospace;
      --font-display: 'Syne', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-mono); min-height: 100vh; }

    /* HEADER */
    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 32px; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      position: relative;
    }
    header::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), var(--accent3), transparent);
    }
    .logo { font-family: var(--font-display); font-size: 22px; font-weight: 900; }
    .logo span { color: var(--accent); }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .live-badge {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 700; color: var(--green);
      background: var(--green-dim); padding: 4px 10px;
      border-radius: 4px; border: 1px solid rgba(34,197,94,0.3);
    }
    .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 1.5s ease-in-out infinite; }
    .btn-clear-lb {
      font-family: var(--font-mono); font-size: 11px; font-weight: 700;
      background: rgba(239,68,68,0.1); color: var(--red);
      border: 1px solid rgba(239,68,68,0.3); padding: 6px 12px;
      border-radius: 4px; cursor: pointer; transition: all 0.2s;
    }
    .btn-clear-lb:hover { background: rgba(239,68,68,0.2); }
    .last-update { font-size: 11px; color: var(--muted); }

    /* MAIN */
    main { padding: 32px; max-width: 1200px; margin: 0 auto; }

    /* STATS */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 20px; text-align: center;
    }
    .stat-number { font-family: var(--font-display); font-size: 36px; font-weight: 900; color: var(--accent); }
    .stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; letter-spacing: 1px; text-transform: uppercase; }

    /* TABLE */
    .table-wrap {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden;
    }
    .table-header {
      padding: 16px 20px; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .table-title { font-family: var(--font-display); font-size: 16px; font-weight: 700; }
    .count-badge {
      font-size: 11px; font-weight: 700; color: var(--accent3);
      background: rgba(6,182,212,0.1); padding: 3px 8px;
      border-radius: 4px; border: 1px solid rgba(6,182,212,0.2);
    }

    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left; padding: 12px 16px;
      font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--muted);
      background: var(--surface2); border-bottom: 1px solid var(--border);
    }
    td { padding: 16px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    /* RANK */
    .rank-medal { font-size: 22px; }

    /* NAME */
    .name-cell { font-weight: 700; color: var(--text); font-size: 14px; }
    .roll-cell { color: var(--muted); font-size: 11px; margin-top: 2px; }

    /* QUESTIONS SOLVED */
    .solved-cell { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .q-chip {
      font-size: 10px; font-weight: 700;
      background: rgba(255,107,53,0.1); color: var(--accent);
      border: 1px solid rgba(255,107,53,0.3);
      padding: 3px 8px; border-radius: 4px;
    }
    .q-chip.pending {
      background: rgba(71,85,105,0.2); color: var(--muted);
      border-color: var(--border);
    }
    .solved-count {
      font-family: var(--font-display); font-size: 18px; font-weight: 900;
      color: var(--green); min-width: 24px;
    }

    /* TIME */
    .time-total { font-weight: 700; color: var(--accent3); font-size: 14px; }
    .time-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }

    /* SCORE BAR */
    .score-bar-wrap { width: 120px; }
    .score-bar-bg { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
    .score-bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent2), var(--accent3)); transition: width 0.5s ease; }
    .score-label { font-size: 10px; color: var(--muted); margin-top: 4px; }

    /* TOP 3 rows */
    tr.rank-1 td { background: rgba(251,191,36,0.04); }
    tr.rank-2 td { background: rgba(148,163,184,0.03); }
    tr.rank-3 td { background: rgba(205,124,47,0.03); }

    /* EMPTY */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-title { font-family: var(--font-display); font-size: 18px; color: var(--text2); margin-bottom: 6px; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
    tbody tr { animation: fadeIn 0.3s ease; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
  <script src="js/config.js"></script>

<header>
  <div class="logo">⚔️ Hack &amp; <span>Crack</span> — Live Leaderboard</div>
  <div class="header-right">
    <div class="live-badge"><div class="live-dot"></div> LIVE</div>
    <span class="last-update" id="last-update">Updating...</span>
    <a href="/control.html" style="font-size:11px;color:var(--accent);border:1px solid rgba(59,130,246,0.3);padding:5px 12px;border-radius:4px;text-decoration:none;">⚙️ Control Panel</a>
    <button class="btn-clear-lb" id="btn-clear-lb">🗑️ Clear All</button>
  </div>
</header>

<main>
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-number" id="stat-participants">0</div>
      <div class="stat-label">Participants</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="stat-solved" style="color:var(--green)">0</div>
      <div class="stat-label">Total Solves</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="stat-questions" style="color:var(--accent2)">0</div>
      <div class="stat-label">Questions Active</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="stat-fastest" style="color:var(--accent3)">—</div>
      <div class="stat-label">Fastest Solve</div>
    </div>
  </div>

  <div class="table-wrap">
    <div class="table-header">
      <span class="table-title">🏆 Rankings</span>
      <span class="count-badge" id="count-badge">0 participants</span>
    </div>
    <table>
      <thead>
        <tr>
          <th style="width:60px">Rank</th>
          <th>Participant</th>
          <th>Questions Solved</th>
          <th>Total Time</th>
          <th>Progress</th>
          <th>AI Score</th>
        </tr>
      </thead>
      <tbody id="leaderboard-body">
        <tr>
          <td colspan="5">
            <div class="empty-state">
              <div class="empty-icon">🏆</div>
              <div class="empty-title">No submissions yet</div>
              <div>Waiting for participants to solve questions...</div>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</main>

<script>
  let allSubmissions  = [];
  let totalQuestions  = 0;

  // ── FETCH QUESTIONS COUNT ────────────────────────────────────────
  async function fetchQuestionCount() {
    try {
      const res = await fetch(`${HC_CONFIG.BASE_URL}/questions`);
      const q   = await res.json();
      totalQuestions = Object.keys(q).length;
    } catch(e) {}
  }

  // ── FETCH LEADERBOARD ────────────────────────────────────────────
  async function fetchLeaderboard() {
    try {
      const res      = await fetch(`${HC_CONFIG.BASE_URL}/leaderboard`);
      allSubmissions = await res.json();
      renderLeaderboard();
      document.getElementById('last-update').textContent =
        'Updated: ' + new Date().toLocaleTimeString();
    } catch(e) {
      document.getElementById('last-update').textContent = 'Connection error';
    }
  }

  // ── BUILD PARTICIPANT MAP ────────────────────────────────────────
  function buildParticipantMap() {
    const map = {};
    allSubmissions.forEach(s => {
      const key = s.roll;
      if (!map[key]) {
        map[key] = {
          name:      s.name,
          roll:      s.roll,
          solved:    {},   // qid → timeTaken
        };
      }
      // Only keep fastest time per question
      if (!map[key].solved[s.question] || s.timeTaken < map[key].solved[s.question]) {
        map[key].solved[s.question] = { time: s.timeTaken || 0, aiScore: s.aiScore };
      }
    });
    return map;
  }

  // ── RENDER ───────────────────────────────────────────────────────
  function renderLeaderboard() {
    const map          = buildParticipantMap();
    const participants = Object.values(map);

    // Calculate avg AI score per participant
    Object.values(map).forEach(p => {
      const scores = Object.values(p.solved)
        .map(s => s.aiScore)
        .filter(s => s !== undefined && s !== null);
      p.avgAiScore = scores.length
        ? Math.round((scores.reduce((a,b) => a+b, 0) / scores.length) * 10) / 10
        : 0;
    });

    // Sort: most questions solved first, then fastest total time
    participants.sort((a, b) => {
      const aSolved = Object.keys(a.solved).length;
      const bSolved = Object.keys(b.solved).length;
      if (bSolved !== aSolved) return bSolved - aSolved;
      // Same count → compare total time
      const aTime = Object.values(a.solved).reduce((s, t) => s + (t.time || 0), 0);
      const bTime = Object.values(b.solved).reduce((s, t) => s + (t.time || 0), 0);
      return aTime - bTime;
    });

    // Stats
    document.getElementById('stat-participants').textContent = participants.length;
    document.getElementById('stat-solved').textContent       = allSubmissions.length;
    document.getElementById('stat-questions').textContent    = totalQuestions;
    document.getElementById('count-badge').textContent       = `${participants.length} participants`;

    const allTimes = allSubmissions.map(s => s.timeTaken).filter(t => t);
    document.getElementById('stat-fastest').textContent = allTimes.length ? Math.min(...allTimes) + 's' : '—';

    const tbody = document.getElementById('leaderboard-body');

    if (participants.length === 0) {
      tbody.innerHTML = `
        <tr><td colspan="5">
          <div class="empty-state">
            <div class="empty-icon">🏆</div>
            <div class="empty-title">No submissions yet</div>
            <div>Waiting for participants to solve questions...</div>
          </div>
        </td></tr>`;
      return;
    }

    tbody.innerHTML = participants.map((p, i) => {
      const rank       = i + 1;
      const medal      = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : `#${rank}`;
      const rankClass  = rank <= 3 ? `rank-${rank}` : '';
      const solvedKeys = Object.keys(p.solved);
      const solvedCount= solvedKeys.length;
      const totalTime  = Object.values(p.solved).reduce((s, t) => s + (t.time || t), 0).toFixed(1);
      const avgTime    = solvedCount ? (totalTime / solvedCount).toFixed(1) : '—';
      const progress   = totalQuestions ? Math.round((solvedCount / totalQuestions) * 100) : 0;
      const avgAiScore = p.avgAiScore || 0;

      // Build question chips — show all questions, solved ones highlighted
      const allQids = Array.from({length: totalQuestions}, (_, i) => `Q${i+1}`);
      const chips   = allQids.map(qid =>
        solvedKeys.includes(qid)
          ? `<span class="q-chip" title="${p.solved[qid].time || 0}s">${qid} ✓</span>`
          : `<span class="q-chip pending">${qid}</span>`
      ).join('');

      return `
        <tr class="${rankClass}">
          <td><span class="rank-medal">${medal}</span></td>
          <td>
            <div class="name-cell">${esc(p.name)}</div>
            <div class="roll-cell">${esc(p.roll)}</div>
          </td>
          <td>
            <div style="display:flex;align-items:center;gap:10px;">
              <span class="solved-count">${solvedCount}</span>
              <div class="solved-cell">${chips}</div>
            </div>
          </td>
          <td>
            <div class="time-total">${totalTime}s</div>
            <div class="time-sub">avg ${avgTime}s / question</div>
          </td>
          <td>
            <div class="score-bar-wrap">
              <div class="score-bar-bg">
                <div class="score-bar-fill" style="width:${progress}%"></div>
              </div>
              <div class="score-label">${solvedCount}/${totalQuestions} questions</div>
            </div>
          </td>
          <td>
            ${avgAiScore > 0
              ? `<div style="font-weight:700;color:${avgAiScore >= 8 ? 'var(--green)' : avgAiScore >= 6 ? 'var(--yellow)' : 'var(--red)'};">${avgAiScore}/10</div>`
              : '<div style="color:var(--muted);font-size:11px;">—</div>'
            }
          </td>
        </tr>`;
    }).join('');
  }

  // ── CLEAR ────────────────────────────────────────────────────────
  document.getElementById('btn-clear-lb').addEventListener('click', async () => {
    const secret = prompt('Enter judge secret:');
    if (!secret) return;
    try {
      const res  = await fetch(`${HC_CONFIG.BASE_URL}/clear`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ secret })
      });
      const data = await res.json();
      if (data.success) { fetchLeaderboard(); alert('Leaderboard cleared!'); }
      else alert('Wrong secret!');
    } catch(e) { alert('Error'); }
  });

  function esc(str) {
    return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── START ────────────────────────────────────────────────────────
  fetchQuestionCount();
  fetchLeaderboard();
  setInterval(fetchLeaderboard, 5000);
</script>
</body>
</html>
